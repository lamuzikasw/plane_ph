worker_processes 4;

events {
  worker_connections 1024;
}

http {
  include mime.types;

  default_type  application/octet-stream;

  sendfile on;
  tcp_nopush on;

  # Compress text assets before they leave the web container. The generated
  # JavaScript and CSS bundles are highly compressible and otherwise dominate
  # the first page load.
  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_vary on;
  gzip_types
    application/javascript
    application/json
    application/xml
    image/svg+xml
    text/css
    text/plain;

  set_real_ip_from        0.0.0.0/0;
  real_ip_recursive       on;
  real_ip_header          X-Forwarded-For;
  limit_req_zone          $binary_remote_addr zone=mylimit:10m rate=10r/s;

  access_log /dev/stdout;
  error_log /dev/stderr;

  server {
    listen 3000;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Vite filenames contain a content hash, so they can be cached forever.
    # When the content changes, the URL changes as well.
    location ^~ /assets/ {
      root /usr/share/nginx/html;
      try_files $uri =404;

      add_header Cache-Control "public, max-age=31536000, immutable" always;
      add_header X-Frame-Options "DENY" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
      add_header X-XSS-Protection "1; mode=block" always;
    }

    location / {
      root   /usr/share/nginx/html;
      index  index.html index.htm;
      try_files $uri $uri/ /index.html;

      # Always revalidate the SPA shell so a deployment can point the browser
      # at the newest hashed assets immediately.
      expires -1;
    }
  }
}
